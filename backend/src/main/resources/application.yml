server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/daily_health?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: dailyHealthSecretKey2024VeryLongSecretKeyForJwtToken
  expiration: 86400000

logging:
  level:
    com.dailyhealth: DEBUG
    org.hibernate.SQL: DEBUG
